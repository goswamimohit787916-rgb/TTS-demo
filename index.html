<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#1d273d', border: '#e4e7eb' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f8fa; color: #1d273d; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .platform-card { background: white; border: 1px solid #e4e7eb; height: 100vh; display: flex; overflow: hidden; width: 100vw; }
        
        /* Sidebar & Responsive Hide */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px !important; }
            .controls-row { flex-direction: column; }
            .controls-row > div, .controls-row button { width: 100% !important; }
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { display: none; width: 16px; height: 16px; border: 2px solid #ddd; border-top: 2px solid #1d273d; border-radius: 50%; animation: spin 1s linear infinite; }
        .is-loading .spinner { display: block; }
        .is-loading #btnText { display: none; }
        
        /* Waveform Logic */
        .wave-progress { position: absolute; top: 0; left: 0; height: 100%; background: rgba(29, 39, 61, 0.4); pointer-events: none; width: 0%; transition: width 0.1s linear; }
        textarea { border: 1px solid #e4e7eb; outline: none; transition: border 0.2s; resize: none; }
        textarea:focus { border-color: #3b82f6; }
    </style>
</head>
<body>

    <div class="platform-card">
        
        <aside class="sidebar w-64 border-r border-border p-6 flex flex-col bg-white shrink-0">
            <div class="font-bold text-xl mb-10 flex items-center gap-2">
                <i class="fa-solid fa-microphone-lines text-blue-600"></i> Voice.AI
            </div>
            <nav class="space-y-1 flex-grow">
                <div class="bg-slate-100 p-3 rounded-lg flex items-center gap-3 font-semibold cursor-pointer">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
                </div>
                <div class="p-3 text-slate-500 flex items-center gap-3 hover:bg-slate-50 cursor-pointer">
                    <i class="fa-solid fa-users"></i> Voices
                </div>
                <div class="p-3 text-slate-500 flex items-center gap-3 hover:bg-slate-50 cursor-pointer" onclick="openAPIModal()">
                    <i class="fa-solid fa-key"></i> Settings
                </div>
            </nav>
            <div class="border-t pt-4">
                <div class="flex items-center gap-3">
                    <img src="https://avatar.vercel.sh/user.png" class="size-9 rounded-full">
                    <div class="text-xs">
                        <p class="font-bold">John Doe</p>
                        <p class="text-slate-500">Pro Tier</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col p-8 bg-white main-content">
            
            <div class="flex border border-border rounded-t-lg p-1 w-fit mb-[-1px] z-10 bg-white">
                <button class="px-10 py-2 font-medium text-sm">Text</button>
            </div>

            <div class="border border-border p-6 rounded-b-lg rounded-tr-lg flex-grow flex flex-col relative">
                <textarea id="mainInput" class="flex-grow text-lg p-2" placeholder="Enter your text here or paste your script..."></textarea>
                <div class="mt-4 flex justify-between items-center text-xs text-slate-400">
                    <span id="counter">0 / 2,500</span>
                    <div class="flex gap-4">
                        <button onclick="document.getElementById('fileIn').click()" class="hover:text-blue-600 flex items-center gap-2">
                            <i class="fa-solid fa-arrow-up-from-bracket"></i> Upload TXT
                        </button>
                        <button onclick="triggerClone()" class="hover:text-blue-600 flex items-center gap-2">
                            <i class="fa-solid fa-comment-dots"></i> Clone Voice
                        </button>
                    </div>
                </div>
            </div>

            <div class="controls-row flex items-center gap-4 mt-6">
                <div class="flex flex-1 gap-3">
                    <select id="vSelect" class="flex-1 p-3 border border-border rounded-lg text-sm appearance-none bg-white"></select>
                    <select class="flex-1 p-3 border border-border rounded-lg text-sm bg-white">
                        <option>Language English</option>
                    </select>
                    <select class="flex-1 p-3 border border-border rounded-lg text-sm bg-white">
                        <option>Style Standard</option>
                    </select>
                </div>
                <button id="genBtn" onclick="handleGenerate()" class="w-40 bg-primary text-white py-3 rounded-lg font-bold hover:bg-black transition active:scale-95 flex items-center justify-center gap-2">
                    <span id="btnText">Generate</span>
                    <div class="spinner"></div>
                </button>
            </div>

            <div id="playerUI" class="mt-8 border border-border p-4 rounded-xl hidden flex flex-col gap-2 bg-slate-50">
                <div class="flex items-center gap-4">
                    <button onclick="togglePlayback()" id="playBtn" class="size-12 rounded-full border bg-white flex items-center justify-center text-lg hover:bg-slate-50 active:scale-90">
                        <i id="pIcon" class="fa-solid fa-play"></i>
                    </button>
                    <div class="flex-1 relative h-12 bg-white rounded border overflow-hidden">
                        <img src="image_0.png" class="h-full w-full object-cover opacity-20" style="clip-path: inset(11% 6% 28% 31%);">
                        <div id="waveProgress" class="wave-progress"></div>
                    </div>
                </div>
                <div class="flex items-center justify-between text-[10px] text-slate-500 font-mono">
                    <span id="timeInfo">00:00 / 00:00</span>
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-volume-high"></i>
                        <input type="range" id="vol" min="0" max="1" step="0.1" value="1" class="w-16 accent-primary">
                        <a id="dl" download="speech.mp3" class="text-blue-600 text-sm"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <input type="file" id="fileIn" class="hidden" accept=".txt">
    <input type="file" id="cloneIn" class="hidden" accept="audio/*">
    <audio id="audioEngine"></audio>

    <script>
        let API_KEY = localStorage.getItem('eleven_key') || '';
        const input = document.getElementById('mainInput');
        const audio = document.getElementById('audioEngine');
        const voices = [
            {id: '21m00Tcm4TlvDq8ikWAM', name: 'Rachel (Default)'},
            {id: 'pNInz6obpgDQGcFmaJgB', name: 'Adam (Narrator)'},
            {id: 'EXAVITQu4vr4xnSDxMaL', name: 'Bella (Soft)'}
        ];

        // Init Voice Select
        const vs = document.getElementById('vSelect');
        voices.forEach(v => vs.innerHTML += `<option value="${v.id}">Voice ${v.name}</option>`);

        // 1. SETTINGS LOGIC
        function openAPIModal() {
            const key = prompt("Enter ElevenLabs API Key:", API_KEY);
            if(key) { API_KEY = key; localStorage.setItem('eleven_key', key); }
        }

        // 2. IMPORT TXT LOGIC
        document.getElementById('fileIn').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                input.value = ev.target.result;
                updateCounter();
            };
            reader.readAsText(e.target.files[0]);
        };

        // 3. CLONE VOICE LOGIC
        function triggerClone() {
            const name = prompt("Enter a name for this cloned voice:");
            if(!name) return;
            document.getElementById('cloneIn').click();
            document.getElementById('cloneIn').onchange = () => alert(`Ready to upload "${name}" to ElevenLabs API!`);
        }

        // 4. GENERATE LOGIC
        async function handleGenerate() {
            if(!API_KEY) return openAPIModal();
            if(!input.value) return alert("Please enter text.");

            const btn = document.getElementById('genBtn');
            btn.classList.add('is-loading');
            btn.disabled = true;

            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vs.value}`, {
                    method: 'POST',
                    headers: { 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: input.value,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });

                if(!res.ok) throw new Error("API Error: Check credits/key");

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                audio.src = url;
                document.getElementById('dl').href = url;
                document.getElementById('playerUI').classList.remove('hidden');
                audio.play();
            } catch (e) {
                alert(e.message);
            } finally {
                btn.classList.remove('is-loading');
                btn.disabled = false;
            }
        }

        // 5. PLAYER LOGIC
        function togglePlayback() {
            if(audio.paused) audio.play(); else audio.pause();
        }

        audio.onplay = () => document.getElementById('pIcon').className = 'fa-solid fa-pause';
        audio.onpause = () => document.getElementById('pIcon').className = 'fa-solid fa-play';

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('waveProgress').style.width = pct + '%';
            document.getElementById('timeInfo').innerText = `${fmt(audio.currentTime)} / ${fmt(audio.duration || 0)}`;
        };

        function fmt(s) {
            const m = Math.floor(s/60).toString().padStart(2, '0');
            const sec = Math.floor(s%60).toString().padStart(2, '0');
            return `${m}:${sec}`;
        }

        function updateCounter() {
            document.getElementById('counter').innerText = `${input.value.length.toLocaleString()} / 2,500`;
        }
        input.oninput = updateCounter;
        document.getElementById('vol').oninput = (e) => audio.volume = e.target.value;
    </script>
</body>
</html>
