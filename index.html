<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen Voice Studio</title><style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}
.container {
    max-width:700px;
    margin:auto;
    padding:20px;
}
h1 {
    text-align:center;
}
textarea {
    width:100%;
    height:120px;
    padding:10px;
    border-radius:10px;
    border:none;
}
input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}
button {
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
audio {
    width:100%;
    margin-top:20px;
}
.section {
    margin-top:20px;
}
label {
    font-size:14px;
    opacity:0.8;
}
.slider {
    width:100%;
}
.status {
    margin-top:10px;
    text-align:center;
    color:#38bdf8;
}
</style></head><body><div class="container"><h1>Qwen Voice Studio</h1><div class="section">
<label>Text</label>
<textarea id="text" placeholder="Type your text here..."></textarea>
</div><div class="section">
<label>Voice Style (optional)</label>
<input id="voice" placeholder="e.g. deep male, soft female, cinematic narrator">
</div><div class="section">
<label>Temperature</label>
<input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7" class="slider"><label>Top P</label>
<input type="range" id="top_p" min="0" max="1" step="0.1" value="0.9" class="slider">

<label>Repetition Penalty</label>
<input type="range" id="rep" min="1" max="2" step="0.1" value="1.1" class="slider">

</div><button onclick="generate()">Generate Voice</button>

<div class="status" id="status"></div><audio id="player" controls></audio>

<a id="download" download="qwen_audio.wav">
<button>Download Audio</button>
</a></div><script>

const API = "https://3a31d8403688d660b3.gradio.live/run/predict";

async function generate() {

    const text = document.getElementById("text").value;
    const voice = document.getElementById("voice").value;
    const temperature = parseFloat(document.getElementById("temperature").value);
    const top_p = parseFloat(document.getElementById("top_p").value);
    const rep = parseFloat(document.getElementById("rep").value);

    const status = document.getElementById("status");

    if (!text) {
        status.innerText = "Enter text first";
        return;
    }

    status.innerText = "Generating...";

    try {

        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                data: [text, voice, temperature, top_p, rep]
            })
        });

        const result = await res.json();

        const base64Audio = result.data[0];

        const audioSrc = "data:audio/wav;base64," + base64Audio;

        document.getElementById("player").src = audioSrc;
        document.getElementById("download").href = audioSrc;

        status.innerText = "Done";

    } catch (e) {
        status.innerText = "Error: " + e.message;
    }
}

</script></body>
</html>
