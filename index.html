<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Studio - Generate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script>
        // Custom Tailwind Config for precision
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1d273d', // Dark text color from image
                        border: '#e4e7eb', // Border color
                        bgMain: '#f7f8fa' // Outer background color
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f8fa; color: #1d273d; padding: 20px; -webkit-font-smoothing: antialiased; }
        .platform-card { background: white; border: 1px solid #e4e7eb; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .active-tab { color: #1d273d; font-weight: 500; }
        .inactive-tab { color: #8e95a7; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; font-size: 14px; color: #6e7687; cursor: pointer; border-radius: 6px; }
        .nav-link:hover { background-color: #f1f3f6; color: #1d273d; }
        .nav-active { background-color: #f1f3f6; color: #1d273d; font-weight: 500; }
        
        /* Precision UI Elements */
        textarea, select, button { border: 1px solid #e4e7eb; border-radius: 6px; transition: all 0.2s; }
        select { border: 1px solid #e4e7eb; border-radius: 6px; -webkit-appearance: none; appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 20 20"><path fill="%23666" d="M0 6l10 10 10-10H0z"/></svg>') no-repeat right 12px center; background-size: 10px; }
        
        /* Working Animations */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { display: none; width: 14px; height: 14px; border: 2px solid #e2e8f0; border-top: 2px solid #1d273d; border-radius: 50%; animation: spin 1s linear infinite; }
        
        .wave-container .bar { background-color: #e4e7eb; height: 48px; width: 100%; position: absolute; top: 0; left: 0; clip-path: inset(0 100% 0 0); transition: clip-path 0.1s linear; }
        .wave-container { position: relative; }
        .is-working #btnSpinner { display: inline-block; }
        .is-working #btnText { display: none; }
        .is-working .platform-card { opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="platform-card w-full max-w-[1020px] h-[680px] flex overflow-hidden">
        
        <aside class="w-[210px] border-r border-border p-5 flex flex-col">
            <nav class="space-y-1.5 flex-grow">
                <div class="nav-link nav-active"><i class="fa-solid fa-bars-progress text-lg"></i> Generate</div>
                <div class="nav-link"><i class="fa-solid fa-headset text-lg"></i> Voices</div>
                <div class="nav-link"><i class="fa-solid fa-diagram-project text-lg"></i> Projects</div>
                <div class="nav-link" onclick="promptKey()"><i class="fa-solid fa-key text-lg"></i> API Key Setup</div>
            </nav>
            <div class="space-y-4 border-t border-border pt-4">
                <div class="nav-link"><i class="fa-solid fa-question-circle text-lg text-[#6e7687]"></i> Help</div>
                <div class="border-t border-border pt-3 flex items-center gap-3">
                    <img src="https://avatar.vercel.sh/john.png" alt="Avatar" class="size-9 rounded-full">
                    <div>
                        <p class="font-semibold text-sm">John Doe</p>
                        <p class="text-xs text-[#6e7687]">john@example.com</p>
                    </div>
                </div>
            </div>
        </aside>

        <main id="workspace" class="flex-1 bg-white p-6 md:p-8 flex flex-col transition-opacity">
            
            <div class="flex gap-4 border border-border rounded-t-lg p-1.5 text-sm w-fit bg-white">
                <button id="tabText" class="px-8 py-2 active-tab transition">Text</button>
                <button id="tabFileUpload" class="px-8 py-2 inactive-tab bg-[#f7f8fa] rounded transition">File Upload</button>
            </div>

            <div class="border border-border border-t-0 p-5 space-y-5 rounded-b-lg rounded-tr-lg">
                <textarea id="ttsInput" class="w-full h-[280px] p-4 text-[15px] outline-none resize-none transition" placeholder="Enter your text here or paste your script..."></textarea>
                <div class="text-[13px] text-[#8e95a7] flex justify-between">
                    <span id="charCount">0 / 2,500</span>
                    <span id="charWarning" class="text-red-500 hidden">Max limit reached</span>
                </div>
            </div>

            <div class="flex gap-3.5 mt-4 text-[14px]">
                <button id="btnUpload" class="flex items-center gap-2.5 px-6 py-2.5 hover:bg-slate-50">
                    <i class="fa-solid fa-arrow-up-from-bracket text-xs text-[#6e7687]"></i> Upload TXT
                </button>
                <button id="btnClone" class="flex items-center gap-2.5 px-6 py-2.5 hover:bg-slate-50">
                    <i class="fa-solid fa-comments text-xs text-[#6e7687]"></i> Clone Voice
                </button>
            </div>

            <div class="flex items-center justify-between gap-3 mt-6">
                <div class="flex gap-3 flex-1 text-[14px]">
                    <select id="voiceSelect" class="px-4 py-2.5 flex-1 pr-8 text-[#1d273d]">
                        <option value="">Voice: Default Voice</option>
                        <option value="EXAVITQu4vr4xnSDxMaL">Voice: Bella</option>
                        <option value="pNInz6obpgDQGcFmaJgB">Voice: Adam</option>
                    </select>
                    <select id="langSelect" class="px-4 py-2.5 flex-1 pr-8 text-[#1d273d]">
                        <option>Language: English</option>
                        <option>Language: Spanish</option>
                    </select>
                    <select id="styleSelect" class="px-4 py-2.5 flex-1 pr-8 text-[#1d273d]">
                        <option>Style: Standard</option>
                        <option>Style: Chatty</option>
                    </select>
                </div>
                <button id="btnGenerate" class="w-[125px] h-[40px] flex items-center justify-center py-2.5 text-[14px] font-medium border bg-white hover:bg-slate-50 transition active:scale-[0.98]">
                    <span id="btnText">Generate</span>
                    <span id="btnSpinner" class="spinner"></span>
                </button>
            </div>

            <div class="platform-card mt-auto border border-border p-4 flex flex-col gap-2">
                <div class="flex items-center gap-4">
                    <button id="playerPlay" class="size-11 flex items-center justify-center rounded-full border border-border hover:bg-slate-50 text-[#1d273d] transition active:scale-95">
                        <i id="playIcon" class="fa-solid fa-play"></i>
                        <i id="pauseIcon" class="fa-solid fa-pause hidden"></i>
                    </button>
                    <div class="flex-1 wave-container">
                        <img src="image_0.png" class="h-12 w-full object-cover opacity-30 select-none pointer-events-none" style="clip-path: inset(11% 6% 28% 31%);" draggable="false">
                        <div id="waveBar" class="bar"></div>
                    </div>
                </div>
                
                <div class="flex items-center text-xs text-[#6e7687] mt-1 pl-1">
                    <div class="flex gap-1.5 items-center">
                        <i id="footerStatusIcon" class="fa-solid fa-play text-[9px]"></i> 
                        <span id="timeCurrent">00:00</span> / <span id="timeTotal">00:00</span>
                    </div>
                    <div class="ml-auto flex items-center gap-4">
                        <i id="volIcon" class="fa-solid fa-volume-up text-sm cursor-pointer"></i>
                        <input type="range" id="volSlider" class="w-20 accent-[#1d273d] h-1" min="0" max="1" step="0.1" value="0.8">
                        <a id="audioDl" href="#" download class="text-inherit hover:text-black transition">
                            <i class="fa-solid fa-download text-sm"></i>
                        </a>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <audio id="coreAudio"></audio>

    <script>
        // --- Core Configuration & Logic ---
        let XI_API_KEY = localStorage.getItem('elevenlabs_key') || "";
        const MAX_CHARS = 2500;

        // --- Selectors ---
        const workspace = document.getElementById('workspace');
        const ttsInput = document.getElementById('ttsInput');
        const btnGenerate = document.getElementById('btnGenerate');
        const coreAudio = document.getElementById('coreAudio');
        const waveBar = document.getElementById('waveBar');

        // --- Functions ---
        
        // 1. Setup API Key via UI
        function promptKey() {
            const key = prompt("Enter ElevenLabs API Key:", XI_API_KEY);
            if (key) {
                XI_API_KEY = key;
                localStorage.setItem('elevenlabs_key', key);
            }
        }

        // 2. Character Counting Logic
        ttsInput.addEventListener('input', function() {
            const length = this.value.length;
            document.getElementById('charCount').innerText = `${length.toLocaleString()} / ${MAX_CHARS.toLocaleString()}`;
            if (length > MAX_CHARS) {
                document.getElementById('charWarning').classList.remove('hidden');
                btnGenerate.disabled = true;
            } else {
                document.getElementById('charWarning').classList.add('hidden');
                btnGenerate.disabled = false;
            }
        });

        // 3. Tab Switching Logic
        const tabs = [document.getElementById('tabText'), document.getElementById('tabFileUpload')];
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.replace('active-tab', 'inactive-tab'));
                tabs.forEach(t => t.classList.add('bg-[#f7f8fa]'));
                this.classList.replace('inactive-tab', 'active-tab');
                this.classList.remove('bg-[#f7f8fa]');
                if(this.id === 'tabFileUpload') alert('File Upload is not yet connected to logic.');
            });
        });

        // 4. GENERATION LOGIC WITH WORKING ANIMATION
        async function runGeneration() {
            const text = ttsInput.value;
            const voiceId = document.getElementById('voiceSelect').value;
            if(!text) return alert("Write something first!");
            if(!voiceId) return alert("Select a Voice first!");
            if(!XI_API_KEY) return promptKey();

            // Enable Working State (Animation & Locks)
            workspace.classList.add('is-working');
            coreAudio.pause(); // Reset existing audio

            try {
                // REAL API CONNECTION (Points to ElevenLabs)
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: { 'xi-api-key': XI_API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                    })
                });

                if(!response.ok) throw new Error("API Connection Failed - Check key/credits");

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                coreAudio.src = audioUrl;
                document.getElementById('audioDl').href = audioUrl; // Connect download

            } catch (err) {
                alert(err.message);
            } finally {
                // Disable Working State
                workspace.classList.remove('is-working');
            }
        }

        btnGenerate.addEventListener('click', runGeneration);

        // 5. AUDIO PLAYER WORK LOGIC & ANIMATIONS
        const playBtn = document.getElementById('playerPlay');
        const playIcon = document.getElementById('pauseIcon');
        const pauseIcon = document.getElementById('playIcon');
        const curTime = document.getElementById('timeCurrent');
        const totTime = document.getElementById('timeTotal');

        playBtn.addEventListener('click', function() {
            if(!coreAudio.src) return alert("Generate some audio first!");
            if(coreAudio.paused) coreAudio.play(); else coreAudio.pause();
        });

        coreAudio.addEventListener('playing', () => {
            playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden');
        });
        coreAudio.addEventListener('pause', () => {
            playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden');
        });

        // Time Updates & Waveform Animation Logic
        function fmtTime(secs) {
            const mins = Math.floor(secs / 60).toString().padStart(2, '0');
            const scs = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${mins}:${scs}`;
        }
        coreAudio.addEventListener('loadedmetadata', () => { totTime.innerText = fmtTime(coreAudio.duration); });
        coreAudio.addEventListener('timeupdate', () => {
            curTime.innerText = fmtTime(coreAudio.currentTime);
            // Waveform animation logic: slide background mask
            const pct = (coreAudio.currentTime / coreAudio.duration) * 100;
            waveBar.style.clipPath = `inset(0 0 0 ${pct}%)`; // Mask fills up
            waveBar.style.backgroundColor = '#1d273d'; // Bar colors the filled region
        });
        coreAudio.addEventListener('ended', () => { waveBar.style.clipPath = 'inset(0 100% 0 0)'; });

        // Volume Logic
        const volSlider = document.getElementById('volSlider');
        volSlider.addEventListener('input', (e) => coreAudio.volume = e.target.value);

    </script>
</body>
</html>
