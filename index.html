<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Qwen3-TTS Pro Studio</title>
</head>
<body class="bg-[#09090b] text-zinc-200 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl bg-[#121214] border border-zinc-800 rounded-2xl p-8 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 flex items-center gap-2 text-white">
            <span class="bg-blue-600 w-3 h-8 rounded-full"></span> Qwen3-TTS Pro
        </h1>

        <div class="space-y-6">
            <textarea id="text" class="w-full h-40 bg-zinc-900 border border-zinc-800 rounded-xl p-4 outline-none focus:ring-1 focus:ring-blue-500 text-lg" placeholder="Enter text to speak..."></textarea>

            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="text-sm font-medium text-zinc-400">Voice Mode</label>
                    <select id="mode" onchange="toggleClone()" class="w-full bg-zinc-800 border-none rounded-lg p-3">
                        <option value="preset">Preset Voices</option>
                        <option value="clone">Voice Cloning (Upload)</option>
                    </select>
                    
                    <div id="clone-ui" class="hidden">
                        <input type="file" id="ref_audio" accept="audio/*" class="text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-sm font-medium text-zinc-400">Settings</label>
                    <div class="flex items-center gap-2">
                        <span class="text-xs">Speed</span>
                        <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full">
                    </div>
                </div>
            </div>

            <button onclick="generate()" id="btn" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-zinc-200 transition-all">Generate High-Fidelity Audio</button>
        </div>

        <div id="player" class="mt-8 pt-8 border-t border-zinc-800 hidden">
            <audio id="audio-out" controls class="w-full accent-blue-600"></audio>
        </div>
    </div>

    <script>
        function toggleClone() {
            document.getElementById('clone-ui').classList.toggle('hidden', document.getElementById('mode').value !== 'clone');
        }

        async function generate() {
            const btn = document.getElementById('btn');
            const formData = new FormData();
            
            formData.append('text', document.getElementById('text').value);
            formData.append('speed', document.getElementById('speed').value);
            
            if(document.getElementById('mode').value === 'clone') {
                const file = document.getElementById('ref_audio').files[0];
                if(!file) return alert("Upload a 5-10 second sample for cloning!");
                formData.append('ref_audio', file);
            }

            btn.disabled = true; btn.innerText = "Synthesizing...";

            try {
                const response = await fetch('YOUR_WORKER_URL', { method: 'POST', body: formData });
                const blob = await response.blob();
                document.getElementById('audio-out').src = URL.createObjectURL(blob);
                document.getElementById('player').classList.remove('hidden');
            } catch (e) { alert("Error connecting to server"); }
            finally { btn.disabled = false; btn.innerText = "Generate High-Fidelity Audio"; }
        }
    </script>
</body>
</html>
