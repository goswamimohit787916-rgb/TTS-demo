<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Voice Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-xl p-4">

  <h1 class="text-2xl font-bold mb-4 text-center">Qwen3 AI Voice</h1>

  <!-- TEXT INPUT -->
  <textarea id="text"
    class="w-full p-3 rounded bg-gray-900 border border-gray-700"
    rows="5"
    placeholder="Enter text here..."></textarea>

  <!-- FILE INPUT -->
  <input type="file" id="audio" class="mt-3 w-full" accept="audio/*"/>

  <!-- BUTTON -->
  <button onclick="generate()"
    class="mt-4 w-full bg-blue-600 hover:bg-blue-700 p-3 rounded">
    Generate Audio
  </button>

  <!-- STATUS -->
  <p id="status" class="mt-3 text-sm text-gray-400"></p>

  <!-- AUDIO PLAYER -->
  <audio id="player" controls class="mt-4 w-full hidden"></audio>

</div>

<script>
const API_URL = "https://3a31d8403688d660b3.gradio.live/run/predict";

async function generate() {
  const text = document.getElementById("text").value;
  const fileInput = document.getElementById("audio");
  const status = document.getElementById("status");
  const player = document.getElementById("player");

  if (!text) {
    alert("Enter text");
    return;
  }

  status.innerText = "Generating... (first time may take 30s)";
  player.classList.add("hidden");

  try {
    let response;

    // VOICE CLONE MODE
    if (fileInput.files.length > 0) {
      const formData = new FormData();
      formData.append("text", text);
      formData.append("audio", fileInput.files[0]);

      response = await fetch(`${API_URL}/voice-clone`, {
        method: "POST",
        body: formData
      });

    } else {
      // NORMAL TTS
      response = await fetch(`${API_URL}/tts?text=${encodeURIComponent(text)}`, {
        method: "POST"
      });
    }

    if (!response.ok) throw new Error("API error");

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    player.src = url;
    player.classList.remove("hidden");
    player.play();

    status.innerText = "Done";

  } catch (err) {
    console.error(err);
    status.innerText = "Error: API not responding (wait & retry)";
  }
}
</script>

</body>
</html>
