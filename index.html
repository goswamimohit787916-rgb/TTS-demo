<body class="bg-white text-zinc-900 flex flex-col md:flex-row h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="hidden md:flex w-72 bg-zinc-100 flex-col border-r border-zinc-200">
    <div class="p-6 flex items-center gap-3 border-b border-zinc-200">
      <div class="w-10 h-10 bg-zinc-900 text-white rounded-2xl flex items-center justify-center text-xl font-bold">Q</div>
      <span class="text-xl font-semibold">Qwen3 TTS</span>
    </div>

    <nav class="flex-1 p-4 space-y-2 text-sm">
      <a onclick="switchPage(0)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-200 sidebar-active">
        <i class="fas fa-pen-nib"></i> Generate
      </a>
      <a onclick="switchPage(1)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-200">
        <i class="fas fa-microphone"></i> Voices
      </a>
      <a onclick="switchPage(2)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-200">
        <i class="fas fa-folder"></i> Projects
      </a>
      <a onclick="switchPage(3)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-200">
        <i class="fas fa-cog"></i> Settings
      </a>
    </nav>

    <div class="p-4 border-t border-zinc-200">
      <div class="flex items-center gap-3 p-3 hover:bg-zinc-200 rounded-xl cursor-pointer">
        <img src="https://i.pravatar.cc/48" class="w-10 h-10 rounded-xl">
        <div>
          <div class="font-medium text-sm">Mohit</div>
          <div class="text-xs text-zinc-500">1240 credits</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 overflow-auto p-4 md:p-10">

    <div class="max-w-3xl mx-auto">

      <!-- Tabs -->
      <div class="flex bg-zinc-100 rounded-xl p-1 mb-6 w-full sm:w-fit">
        <button onclick="setTab(0)" class="flex-1 sm:flex-none px-6 py-2 rounded-lg bg-white shadow text-sm font-medium">Text</button>
        <button onclick="setTab(1)" class="flex-1 sm:flex-none px-6 py-2 rounded-lg text-zinc-500 text-sm">Upload</button>
      </div>

      <!-- Card -->
      <div class="bg-zinc-50 border border-zinc-200 rounded-2xl p-5 md:p-8">

        <textarea id="input-text"
          class="w-full bg-transparent text-base md:text-lg placeholder-zinc-400 focus:outline-none"
          placeholder="Enter your script..."></textarea>

        <div class="text-right text-xs text-zinc-400 mt-2">0 / 2500</div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 mt-6">
          <button class="flex-1 py-3 bg-zinc-200 hover:bg-zinc-300 rounded-xl text-sm">
            Upload TXT
          </button>
          <button class="flex-1 py-3 bg-zinc-900 text-white hover:bg-zinc-800 rounded-xl text-sm font-medium">
            Clone Voice
          </button>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 mt-8">

          <select class="bg-white border border-zinc-300 rounded-xl px-3 py-2 text-sm">
            <option>Default Voice</option>
          </select>

          <select class="bg-white border border-zinc-300 rounded-xl px-3 py-2 text-sm">
            <option>English</option>
            <option>Hindi</option>
          </select>

          <select class="bg-white border border-zinc-300 rounded-xl px-3 py-2 text-sm">
            <option>Standard</option>
          </select>

          <button class="bg-zinc-900 text-white rounded-xl py-2 text-sm font-medium hover:bg-zinc-800">
            Generate
          </button>
        </div>

      </div>

      <!-- Player -->
      <div class="mt-6 bg-zinc-50 border border-zinc-200 rounded-xl p-4 hidden" id="player">

        <div class="flex items-center gap-3">
          <button class="w-10 h-10 bg-zinc-900 text-white rounded-lg">▶</button>

          <div class="flex-1 h-10 bg-zinc-200 rounded-lg"></div>

          <div class="text-xs text-zinc-500">00:00</div>
        </div>

        <div class="mt-3 flex items-center gap-2 text-xs text-zinc-500">
          Volume
          <input type="range" class="flex-1">
          <button class="px-3 py-1 bg-zinc-200 rounded-lg">Download</button>
        </div>

      </div>

    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 flex justify-around py-2 text-xs">
    <div onclick="switchPage(0)" class="flex flex-col items-center text-zinc-900">
      <i class="fas fa-pen-nib text-lg"></i>
      Generate
    </div>
    <div onclick="switchPage(1)" class="flex flex-col items-center text-zinc-500">
      <i class="fas fa-microphone text-lg"></i>
      Voices
    </div>
    <div onclick="switchPage(2)" class="flex flex-col items-center text-zinc-500">
      <i class="fas fa-folder text-lg"></i>
      Projects
    </div>
    <div onclick="switchPage(3)" class="flex flex-col items-center text-zinc-500">
      <i class="fas fa-cog text-lg"></i>
      Settings
    </div>
  </div>

</body>
