<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VoiceGen</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-gradient-to-b from-blue-900 to-blue-700 text-white p-6">
    <h1 class="text-2xl font-bold mb-8">VoiceGen</h1>

    <div class="space-y-4">
        <div class="bg-blue-600 p-2 rounded">Generate</div>
        <div>Voice Library</div>
        <div>History</div>
        <div>Upgrade</div>
    </div>
</div>

<!-- MAIN -->
<div class="flex-1 p-8">

    <textarea id="text"
        class="w-full h-40 p-4 border rounded"
        placeholder="Paste your script here..."></textarea>

    <button onclick="generate()" 
        class="mt-4 bg-blue-600 text-white px-6 py-3 rounded">
        Generate Voice
    </button>

    <audio id="player" controls class="w-full mt-6"></audio>

</div>
</div>

<script>
async function generate() {

    const text = document.getElementById("text").value;

    const res = await fetch("https://e48d46a8e07012e491.gradio.live/run/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            data: [text]
        })
    });

    const data = await res.json();

    console.log(data);

    // IMPORTANT: extract correct field
    const audio = data.data[0];

    document.getElementById("player").src = audio;
}
</script>

</body>
</html>
