    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --primary: 234 179 8; }
        .tail-container { font-family: 'Inter', system-ui, sans-serif; }
        .sidebar-link { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-link:hover { transform: translateX(4px); }
        .waveform-bar { animation: waveform 1.2s infinite ease-in-out; background: linear-gradient(180deg, #eab308, #ca8a04); }
        @keyframes waveform {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }
        .waveform-container.playing .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform-container.playing .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform-container.playing .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform-container.playing .waveform-bar:nth-child(5) { animation-delay: 0.4s; }
        .waveform-container.playing .waveform-bar:nth-child(6) { animation-delay: 0.5s; }
        .waveform-container.playing .waveform-bar:nth-child(7) { animation-delay: 0.3s; }
        .waveform-container.playing .waveform-bar:nth-child(8) { animation-delay: 0.2s; }
        .waveform-container.playing .waveform-bar:nth-child(9) { animation-delay: 0.1s; }
        .textarea-custom { resize: none; scrollbar-width: thin; }
        .player-progress { accent-color: rgb(234 179 8); }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
