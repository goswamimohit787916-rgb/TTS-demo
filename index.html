<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Qwen3 TTS Studio</title>
</head>
<body class="bg-[#0b0c0e] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-3xl bg-[#141518] border border-zinc-800 rounded-2xl p-8 shadow-2xl">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-white">Qwen3 <span class="text-blue-500">Audio</span></h1>
            <div class="text-xs bg-zinc-800 px-3 py-1 rounded-full text-zinc-400">v1.7B Model</div>
        </header>

        <div class="space-y-4">
            <textarea id="tts-input" 
                class="w-full h-48 bg-[#0b0c0e] border border-zinc-800 rounded-xl p-5 text-lg outline-none focus:border-blue-500 transition-all resize-none"
                placeholder="Type your text here to generate ultra-realistic speech..."></textarea>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-zinc-500">Voice Profile</label>
                    <select id="voice-id" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="serena">Serena (Gentle)</option>
                        <option value="aiden">Aiden (Deep)</option>
                        <option value="cloned_voice">Custom Clone</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="generateSpeech()" id="gen-btn" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all transform active:scale-95 disabled:opacity-50">
                        Generate Speech
                    </button>
                </div>
            </div>
        </div>

        <div id="result-section" class="mt-10 pt-10 border-t border-zinc-800 hidden">
            <div class="flex items-center gap-4">
                <audio id="audio-player" controls class="flex-1 accent-blue-500"></audio>
                <a id="download-link" href="#" download="speech.mp3" class="bg-zinc-800 p-3 rounded-lg hover:bg-zinc-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        async function generateSpeech() {
            const btn = document.getElementById('gen-btn');
            const text = document.getElementById('tts-input').value;
            const voice = document.getElementById('voice-id').value;

            if (!text) return alert("Please enter some text.");

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // REPLACE THIS URL with your Cloudflare Worker URL
                const response = await fetch('https://your-worker.your-subdomain.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, voice })
                });

                if (!response.ok) throw new Error("Generation failed");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                document.getElementById('result-section').classList.remove('hidden');
                document.getElementById('audio-player').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('audio-player').play();

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Speech";
            }
        }
    </script>
</body>
</html>
