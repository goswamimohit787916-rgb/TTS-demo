<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Qwen3 Studio</title>
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-xl bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
        <div class="flex justify-between mb-8">
            <h1 class="text-2xl font-bold">Qwen3 <span class="text-blue-500">Audio</span></h1>
            <span id="credits" class="text-green-500 font-mono text-sm">100 Credits</span>
        </div>

        <textarea id="text" class="w-full h-40 bg-zinc-800 rounded-2xl p-4 outline-none border border-transparent focus:border-blue-500 mb-6" placeholder="Type your script..."></textarea>
        
        <input type="file" id="voice" class="block w-full text-xs text-zinc-500 mb-6 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white">

        <button onclick="run()" id="btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:scale-[0.98] transition-transform">Generate Voice</button>
        
        <audio id="player" controls class="w-full mt-8 hidden accent-blue-500"></audio>
    </div>

    <script>
        async function run() {
            const btn = document.getElementById('btn');
            const fd = new FormData();
            fd.append("text", document.getElementById('text').value);
            fd.append("user_id", "user_123");
            if(document.getElementById('voice').files[0]) fd.append("voice_file", document.getElementById('voice').files[0]);

            btn.innerText = "Synthesizing...";
            btn.disabled = true;

            const res = await fetch('/api/generate', { method: 'POST', body: fd });
            if (res.ok) {
                const blob = await res.blob();
                document.getElementById('player').src = URL.createObjectURL(blob);
                document.getElementById('player').classList.remove('hidden');
            } else {
                alert("Check console for error");
            }
            btn.innerText = "Generate Voice";
            btn.disabled = false;
        }
    </script>
</body>
</html>
