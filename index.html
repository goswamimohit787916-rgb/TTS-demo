<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate - Voice AI Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script>
        // Use custom styling to match the image precisely
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1d273d', // Dark blue used for texts and active items
                        border: '#e4e7eb', // Subtle border color
                        bgMain: '#f7f8fa' // Very light gray for outer background
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f8fa; color: #1d273d; padding: 20px; }
        .platform-card { background: white; border: 1px solid #e4e7eb; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .active-tab { color: #1d273d; font-weight: 500; }
        .inactive-tab { color: #8e95a7; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; font-size: 14px; color: #6e7687; cursor: pointer; border-radius: 6px; }
        .nav-link:hover { background-color: #f1f3f6; color: #1d273d; }
        .nav-active { background-color: #f1f3f6; color: #1d273d; font-weight: 500; }
        textarea, select, button { border: 1px solid #e4e7eb; border-radius: 6px; }
        textarea::placeholder { color: #8e95a7; font-size: 15px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="platform-card w-full max-w-[1020px] h-[680px] flex overflow-hidden">
        
        <aside class="w-[210px] border-r border-border p-5 flex flex-col">
            <nav class="space-y-1.5 flex-grow">
                <div class="nav-link nav-active">
                    <i class="fa-solid fa-bars-progress text-lg"></i> Generate
                </div>
                <div class="nav-link">
                    <i class="fa-solid fa-headset text-lg"></i> Voices
                </div>
                <div class="nav-link">
                    <i class="fa-solid fa-diagram-project text-lg"></i> Projects
                </div>
                <div class="nav-link">
                    <i class="fa-solid fa-gear text-lg"></i> Settings
                </div>
            </nav>
            
            <div class="space-y-4 border-t border-border pt-4">
                <div class="nav-link">
                    <i class="fa-solid fa-question-circle text-lg text-[#6e7687]"></i> Help
                </div>
                <div class="border-t border-border pt-3">
                    <div class="flex items-center gap-3">
                        <img src="https://avatar.vercel.sh/john.png" alt="Avatar" class="size-9 rounded-full">
                        <div>
                            <p class="font-semibold text-sm">John Doe</p>
                            <p class="text-xs text-[#6e7687]">john@example.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-white p-6 md:p-8 flex flex-col">
            
            <div class="flex gap-4 border border-border rounded-t-lg p-1.5 text-sm w-fit bg-white">
                <button class="px-8 py-2 active-tab">Text</button>
                <button class="px-8 py-2 inactive-tab bg-[#f7f8fa] rounded">File Upload</button>
            </div>

            <div class="border border-border border-t-0 p-5 space-y-5 rounded-b-lg rounded-tr-lg">
                <textarea 
                    class="w-full h-[280px] p-4 text-[15px] outline-none resize-none"
                    placeholder="Enter your text here or paste your script..."
                ></textarea>
                <div class="text-[13px] text-[#8e95a7]">0 / 2,500</div>
            </div>

            <div class="flex gap-3.5 mt-4">
                <button class="flex items-center gap-2.5 px-6 py-2.5 text-sm hover:bg-slate-50">
                    <i class="fa-solid fa-arrow-up-from-bracket text-xs"></i> Upload TXT
                </button>
                <button class="flex items-center gap-2.5 px-6 py-2.5 text-sm hover:bg-slate-50">
                    <i class="fa-solid fa-comments text-xs"></i> Clone Voice
                </button>
            </div>

            <div class="flex items-center justify-between gap-3 mt-6">
                <div class="flex gap-3 flex-1">
                    <select class="px-4 py-2.5 text-sm flex-1">
                        <option>Voice Default Voice</option>
                    </select>
                    <select class="px-4 py-2.5 text-sm flex-1">
                        <option>Language English</option>
                    </select>
                    <select class="px-4 py-2.5 text-sm flex-1">
                        <option>Style Standard</option>
                    </select>
                </div>
                <button class="w-[125px] py-2.5 text-sm font-medium border hover:bg-slate-50 transition active:scale-[0.98]">
                    Generate
                </button>
            </div>

            <div class="platform-card mt-auto border border-border p-4 flex flex-col gap-2">
                <div class="flex items-center gap-4">
                    <button class="size-11 flex items-center justify-center rounded-full border border-border hover:bg-slate-50">
                        <i class="fa-solid fa-play text-[#1d273d]"></i>
                    </button>
                    <img src="image_0.png" class="flex-1 h-12 object-cover object-center opacity-30 select-none" style="clip-path: inset(11% 6% 28% 31%);" draggable="false">
                </div>
                
                <div class="flex items-center text-xs text-[#6e7687] mt-1 pl-1">
                    <div class="flex gap-1">
                        <i class="fa-solid fa-play text-[9px] mt-0.5"></i> 00:00 / 00:15
                    </div>
                    <div class="ml-auto flex items-center gap-4">
                        <i class="fa-solid fa-volume-up text-sm"></i>
                        <input type="range" class="w-20 accent-[#1d273d] h-1" value="80">
                        <i class="fa-solid fa-download text-sm cursor-pointer hover:text-black"></i>
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
