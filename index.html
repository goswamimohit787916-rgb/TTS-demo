<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Qwen3 Audio Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; }
        .glass-panel { background: rgba(18, 18, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="text-zinc-300 min-h-screen">

    <nav class="border-b border-zinc-800/50 bg-[#09090b]/80 sticky top-0 z-50 px-6 py-4 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white italic">Q</div>
                <span class="text-xl font-bold text-white tracking-tight">Qwen3 <span class="text-blue-500 italic">Studio</span></span>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end">
                    <span id="creditCount" class="text-green-500 font-bold text-sm">100 Credits</span>
                    <span id="userBadge" class="text-[10px] text-zinc-500 font-mono">ID: user_123</span>
                </div>
                <button class="bg-zinc-800 hover:bg-zinc-700 text-white text-xs font-semibold px-4 py-2 rounded-full transition-all">Upgrade</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto py-12 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-3xl shadow-xl">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500 mb-6">Voice Engine</h3>
                    
                    <div class="space-y-4">
                        <label class="block text-sm font-medium">Generation Mode</label>
                        <select id="mode" onchange="toggleCloneUI()" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm outline-none focus:border-blue-500 transition-colors">
                            <option value="preset">⚡ Standard Preset</option>
                            <option value="clone">🧬 Voice Cloning (pth/wav)</option>
                        </select>
                    </div>

                    <div id="cloneUI" class="hidden mt-6 pt-6 border-t border-zinc-800/50 animate-in fade-in duration-500">
                        <label class="block text-sm font-medium mb-3">Clone Reference Audio</label>
                        <div class="border-2 border-dashed border-zinc-800 rounded-2xl p-4 text-center hover:border-blue-500/50 transition-all group">
                            <input type="file" id="voiceFile" class="hidden" accept=".pth,.wav,.mp3">
                            <label for="voiceFile" class="cursor-pointer">
                                <svg class="w-8 h-8 mx-auto text-zinc-600 mb-2 group-hover:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                <span id="fileName" class="text-xs text-zinc-500">Click to upload .pth or .wav</span>
                            </label>
                        </div>
                    </div>

                    <div class="mt-8 space-y-6">
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-semibold">Speed</label>
                                <span class="text-xs text-blue-500" id="speedVal">1.0x</span>
                            </div>
                            <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-blue-600" oninput="updateVal('speedVal', this.value + 'x')">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="glass-panel rounded-3xl p-8 shadow-2xl relative border-t border-white/5">
                    <textarea id="textInput" rows="10" 
                        class="w-full bg-transparent border-none text-xl text-white outline-none resize-none placeholder-zinc-700 custom-scrollbar"
                        placeholder="Enter the text you want Qwen3 to speak..."></textarea>
                    
                    <div class="mt-8 pt-6 border-t border-zinc-800/50 flex flex-col md:flex-row gap-4 items-center justify-between">
                        <p class="text-[11px] text-zinc-500 italic max-w-xs">Using Qwen3-1.7B-Instruct-Audio. Supports multi-language and emotional inflection.</p>
                        
                        <button onclick="synthesize()" id="genBtn" class="w-full md:w-auto bg-white text-black font-bold px-10 py-4 rounded-2xl hover:bg-blue-500 hover:text-white active:scale-95 transition-all shadow-lg shadow-white/5">
                            Generate Speech
                        </button>
                    </div>
                </div>

                <div id="playerCard" class="hidden glass-panel rounded-3xl p-6 border-l-4 border-blue-600 animate-in slide-in-from-bottom duration-500">
                    <div class="flex items-center gap-6">
                        <div class="bg-blue-600/10 p-4 rounded-2xl">
                            <svg class="w-8 h-8 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.414 4.243 1 1 0 11-1.415-1.415A3.984 3.984 0 0013 10a3.984 3.984 0 00-1.414-2.828a1 1 0 010-1.415z"></path></svg>
                        </div>
                        <div class="flex-1">
                            <span class="text-[10px] text-zinc-500 font-mono mb-1 block">QWEN3_SYNTHESIS_OUT.MP3</span>
                            <audio id="audioOut" controls class="w-full h-10 accent-blue-600"></audio>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Update UI Helper
        function updateVal(id, val) { document.getElementById(id).innerText = val; }
        
        function toggleCloneUI() {
            const isClone = document.getElementById('mode').value === 'clone';
            document.getElementById('cloneUI').classList.toggle('hidden', !isClone);
        }

        // File name display
        document.getElementById('voiceFile').addEventListener('change', function(e) {
            document.getElementById('fileName').innerText = e.target.files[0]?.name || "Click to upload";
        });

        async function synthesize() {
            const btn = document.getElementById('genBtn');
            const text = document.getElementById('textInput').value;
            const mode = document.getElementById('mode').value;
            const file = document.getElementById('voiceFile').files[0];
            const userId = document.getElementById('userId')?.value || "user_123";

            if (!text) return alert("Please enter text.");
            if (mode === 'clone' && !file) return alert("Please upload a .pth or .wav sample.");

            btn.disabled = true;
            btn.innerText = "Connecting to Lightning AI...";

            const formData = new FormData();
            formData.append("user_id", userId);
            formData.append("text", text);
            formData.append("mode", mode);
            formData.append("speed", document.getElementById('speed').value);
            if (file) formData.append("voice_file", file);

            try {
                // Calls your Cloudflare Pages Function at /functions/api/generate.js
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || "Generation Failed");
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                document.getElementById('playerCard').classList.remove('hidden');
                document.getElementById('audioOut').src = url;
                document.getElementById('audioOut').play();

                // Mock credit update
                const credits = parseInt(document.getElementById('creditCount').innerText);
                document.getElementById('creditCount').innerText = `${credits - 1} Credits`;

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Speech";
            }
        }
    </script>
</body>
</html>
