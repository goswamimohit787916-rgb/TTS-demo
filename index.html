<!DOCTYPE html><html>
<head>
<title>Qwen Voice Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:20px; }
.container { max-width:700px; margin:auto; }
input, textarea, select { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; }
button { width:100%; padding:14px; margin-top:15px; background:#22c55e; border:none; border-radius:10px; }
audio { width:100%; margin-top:20px; }
.status { margin-top:10px; color:#38bdf8; }
</style></head><body><div class="container"><h2>Qwen Voice Studio</h2><textarea id="text" placeholder="Enter text"></textarea><select id="preset">
<option value="">Default</option>
<option value="Deep male cinematic voice">Deep Male</option>
<option value="Soft female calm voice">Soft Female</option>
<option value="Energetic voice">Energetic</option>
</select><input id="customVoice" placeholder="Custom voice style"><input type="file" id="voiceFile" accept=".pt"><label>Temperature</label>
<input type="range" id="temp" min="0" max="1" step="0.1" value="0.7">

<label>Top P</label>
<input type="range" id="top_p" min="0" max="1" step="0.1" value="0.9">

<label>Repetition Penalty</label>
<input type="range" id="rep" min="1" max="2" step="0.1" value="1.1">

<button onclick="generate()">Generate</button>

<div class="status" id="status"></div><audio id="player" controls></audio>

<a id="download" download="audio.wav">
<button>Download</button>
</a></div><script>

const API = "https://c43fe42c6616fc03bf.gradio.live/run/predict";

async function generate() {

    const text = document.getElementById("text").value;
    const preset = document.getElementById("preset").value;
    const custom = document.getElementById("customVoice").value;
    const file = document.getElementById("voiceFile").files[0];

    const temp = parseFloat(document.getElementById("temp").value);
    const top_p = parseFloat(document.getElementById("top_p").value);
    const rep = parseFloat(document.getElementById("rep").value);

    const status = document.getElementById("status");

    if (!text) {
        status.innerText = "Enter text";
        return;
    }

    status.innerText = "Generating...";

    let voice = custom || preset || "";

    try {

        const formData = new FormData();

        formData.append("data", JSON.stringify([text, voice, null, temp, top_p, rep]));

        if (file) {
            formData.append("files", file);
        }

        const res = await fetch(API, {
            method: "POST",
            body: formData
        });

        const result = await res.json();
        console.log(result);

        const base64Audio = result.data[0];

        const src = "data:audio/wav;base64," + base64Audio;

        document.getElementById("player").src = src;
        document.getElementById("download").href = src;

        status.innerText = "Done";

    } catch (e) {
        status.innerText = "Error: " + e.message;
    }
}

</script></body>
</html>
