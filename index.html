<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Voice Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8f9fb; }
        .sidebar-active { background: #f0f2f5; border-right: 3px solid #6366f1; color: #111; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-5xl shadow-xl rounded-xl flex overflow-hidden border border-gray-100 min-h-[650px]">
        
        <aside class="w-64 border-r border-gray-100 flex flex-col justify-between py-6">
            <nav class="space-y-1">
                <div class="sidebar-active px-6 py-3 flex items-center gap-3 cursor-pointer">
                    <i class="fa-solid fa-bars-staggered w-5"></i><span class="text-sm font-medium">Generate</span>
                </div>
                <div class="px-6 py-3 flex items-center gap-3 cursor-pointer text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-headphones w-5"></i><span class="text-sm">Voices</span>
                </div>
                <div class="px-6 py-3 flex items-center gap-3 cursor-pointer text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-folder w-5"></i><span class="text-sm">Projects</span>
                </div>
            </nav>
            <div class="px-6 pt-4 border-t border-gray-100 flex items-center gap-3">
                <img src="https://i.pravatar.cc/100" class="w-10 h-10 rounded-full">
                <div><p class="text-sm font-bold text-gray-800">John Doe</p><p id="creditDisplay" class="text-[10px] text-indigo-600 font-bold">100 Credits</p></div>
            </div>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex border-b border-gray-100 mb-6">
                <button class="px-8 py-3 text-sm border-b-2 border-indigo-500 font-bold">Text</button>
                <button class="px-8 py-3 text-sm text-gray-400">File Upload</button>
            </div>

            <div class="border border-gray-200 rounded-lg p-4 mb-4">
                <textarea id="text" class="w-full h-48 outline-none resize-none text-gray-700" placeholder="Enter your script..."></textarea>
                <p class="text-[10px] text-gray-400 mt-2" id="charCount">0 / 2,500</p>
            </div>

            <div class="flex gap-3 mb-8">
                <label class="px-4 py-2 border rounded-md text-sm cursor-pointer hover:bg-gray-50 flex items-center gap-2">
                    <i class="fa-solid fa-microphone"></i> Clone Voice
                    <input type="file" id="cloneFile" class="hidden">
                </label>
            </div>

            <div class="flex items-center gap-4 mb-8">
                <div class="flex-1 grid grid-cols-3 gap-3">
                    <select id="v" class="border rounded-md px-3 py-2 text-xs font-medium outline-none"><option>Default Voice</option></select>
                    <select class="border rounded-md px-3 py-2 text-xs font-medium outline-none"><option>English</option></select>
                    <select class="border rounded-md px-3 py-2 text-xs font-medium outline-none"><option>Standard</option></select>
                </div>
                <button onclick="gen()" id="gb" class="border px-8 py-2 rounded-md font-medium text-sm hover:bg-gray-50">Generate</button>
            </div>

            <div id="ps" class="border bg-[#fcfcfd] rounded-lg p-6 hidden animate-pulse">
                <div class="flex items-center gap-6">
                    <button id="pp" class="w-12 h-12 rounded-full bg-white border flex items-center justify-center shadow-sm"><i class="fa-solid fa-play ml-1"></i></button>
                    <div class="flex-1 h-8 bg-gray-200 rounded-md overflow-hidden relative"><div id="prog" class="h-full bg-indigo-500 w-0 transition-all"></div></div>
                </div>
                <audio id="au" class="hidden"></audio>
            </div>
        </main>
    </div>

    <script>
        async function gen() {
            const b = document.getElementById('gb');
            const fd = new FormData();
            fd.append("text", document.getElementById('text').value);
            fd.append("user_id", "user_admin_01");
            if(document.getElementById('cloneFile').files[0]) fd.append("voice_file", document.getElementById('cloneFile').files[0]);

            b.innerText = "Synthesizing..."; b.disabled = true;
            try {
                const res = await fetch('/api/generate', { method: 'POST', body: fd });
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('ps').classList.remove('hidden');
                document.getElementById('au').src = url;
                document.getElementById('au').play();
            } catch (e) { alert("Error"); }
            b.innerText = "Generate"; b.disabled = false;
        }
    </script>
</body>
</html>
