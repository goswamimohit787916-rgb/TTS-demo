<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice AI - Mobile Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --primary: #1d273d; --border: #e4e7eb; }
        body { background-color: #f7f8fa; color: var(--primary); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Mobile Specific Adjustments */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hide sidebar on mobile to save space */
            .main-container { flex-direction: column; height: auto !important; border-radius: 0; border: none; }
            .content-wrapper { padding: 15px !important; }
            .controls-row { flex-direction: column; gap: 10px; }
            .controls-row select, .controls-row button { width: 100% !important; }
            .tabs-header { width: 100% !important; display: flex; }
            .tabs-header button { flex: 1; }
        }

        .platform-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .nav-active { background-color: #f1f3f6; color: var(--primary); font-weight: 600; }
        textarea { border: 1px solid var(--border); border-radius: 8px; width: 100%; resize: none; outline: none; transition: border 0.2s; }
        textarea:focus { border-color: #3b82f6; }
        select { border: 1px solid var(--border); border-radius: 8px; appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 20 20"><path fill="%23666" d="M0 6l10 10 10-10H0z"/></svg>') no-repeat right 12px center; background-size: 10px; padding-right: 30px; }
        
        /* Loading Spinner */
        .spinner { animation: rotate 2s linear infinite; display: none; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="md:p-10">

    <div class="main-container platform-card w-full max-w-[1100px] h-[750px] mx-auto flex">
        
        <aside class="sidebar w-[240px] border-r border-border p-6 flex flex-col bg-white">
            <div class="text-xl font-bold mb-8 flex items-center gap-2">
                <i class="fa-solid fa-microphone-lines text-blue-600"></i> Voice.ai
            </div>
            <nav class="space-y-1 flex-grow">
                <div class="nav-active p-3 rounded-lg flex items-center gap-3 cursor-pointer"><i class="fa-solid fa-layer-group"></i> Generate</div>
                <div class="p-3 rounded-lg flex items-center gap-3 text-slate-500 hover:bg-slate-50 cursor-pointer"><i class="fa-solid fa-users"></i> Voices</div>
                <div class="p-3 rounded-lg flex items-center gap-3 text-slate-500 hover:bg-slate-50 cursor-pointer"><i class="fa-solid fa-folder"></i> Projects</div>
                <div class="p-3 rounded-lg flex items-center gap-3 text-slate-500 hover:bg-slate-50 cursor-pointer" onclick="openSettings()"><i class="fa-solid fa-key"></i> API Setup</div>
            </nav>
            <div class="border-t pt-4 mt-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700">JD</div>
                    <div class="text-sm"><p class="font-bold">Creator Mode</p><p class="text-xs text-slate-500">Pro Account</p></div>
                </div>
            </div>
        </aside>

        <main class="content-wrapper flex-1 p-8 flex flex-col bg-white">
            
            <div class="tabs-header flex gap-1 bg-slate-100 p-1 rounded-lg w-fit mb-4">
                <button class="px-6 py-2 bg-white rounded shadow-sm text-sm font-medium">Text</button>
                <button class="px-6 py-2 text-sm text-slate-500 hover:text-slate-700" onclick="alert('File upload coming soon')">File Upload</button>
            </div>

            <div class="flex-grow flex flex-col">
                <textarea id="textInput" class="flex-grow p-5 text-base border-slate-200" placeholder="Type or paste your script here..."></textarea>
                <div class="flex justify-between items-center mt-2 text-xs text-slate-400">
                    <span id="charCount">0 / 2500</span>
                    <div class="flex gap-4">
                        <span class="cursor-pointer hover:text-blue-500" onclick="document.getElementById('fileIn').click()"><i class="fa-solid fa-file-import"></i> Upload TXT</span>
                        <input type="file" id="fileIn" class="hidden" accept=".txt">
                    </div>
                </div>
            </div>

            <div class="controls-row flex items-center gap-3 mt-6">
                <select id="voiceId" class="flex-1 p-3 text-sm bg-white border-slate-200">
                    <option value="21m00Tcm4TlvDq8ikWAM">Rachel (Default)</option>
                    <option value="pNInz6obpgDQGcFmaJgB">Adam (Narrator)</option>
                    <option value="EXAVITQu4vr4xnSDxMaL">Bella (Soft)</option>
                </select>
                
                <button id="generateBtn" onclick="processTTS()" class="bg-[#1d273d] text-white px-8 py-3 rounded-lg font-semibold hover:bg-black transition active:scale-95 flex items-center justify-center gap-2">
                    <i id="btnIcon" class="fa-solid fa-wand-magic-sparkles"></i>
                    <i id="btnSpinner" class="fa-solid fa-circle-notch spinner"></i>
                    Generate
                </button>
            </div>

            <div id="playerBox" class="mt-8 p-4 bg-slate-50 rounded-xl border border-slate-200 hidden">
                <div class="flex items-center gap-4">
                    <audio id="mainAudio" controls class="flex-1 h-10"></audio>
                    <a id="downloadLink" download="speech.mp3" class="p-3 bg-white border rounded-lg hover:bg-blue-50 text-blue-600"><i class="fa-solid fa-download"></i></a>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- REAL FUNCTIONALITY ---
        let API_KEY = localStorage.getItem('XI_API_KEY') || "";

        function openSettings() {
            const key = prompt("Enter your ElevenLabs API Key:", API_KEY);
            if (key) {
                API_KEY = key;
                localStorage.setItem('XI_API_KEY', key);
            }
        }

        // Character Counter
        const txt = document.getElementById('textInput');
        txt.addEventListener('input', () => {
            document.getElementById('charCount').innerText = `${txt.value.length} / 2500`;
        });

        async function processTTS() {
            if (!API_KEY) {
                alert("Please click 'API Setup' in the sidebar (or bottom of screen) to add your key first.");
                return;
            }

            const text = txt.value;
            const voice = document.getElementById('voiceId').value;
            const btn = document.getElementById('generateBtn');
            const icon = document.getElementById('btnIcon');
            const spinner = document.getElementById('btnSpinner');

            if (!text) return alert("Write something first!");

            // UI Loading State
            btn.disabled = true;
            icon.style.display = "none";
            spinner.style.display = "block";

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });

                if (!response.ok) throw new Error("Check your API Key or Credits");

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                const player = document.getElementById('mainAudio');
                const box = document.getElementById('playerBox');
                const dl = document.getElementById('downloadLink');

                player.src = audioUrl;
                dl.href = audioUrl;
                box.classList.remove('hidden');
                player.play();

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                icon.style.display = "block";
                spinner.style.display = "none";
            }
        }

        // File Upload Logic
        document.getElementById('fileIn').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                txt.value = e.target.result;
                document.getElementById('charCount').innerText = `${txt.value.length} / 2500`;
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
